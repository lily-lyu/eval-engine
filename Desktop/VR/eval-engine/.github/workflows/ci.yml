name: eval-engine-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  invariants:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            pip install -e .
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install fastapi uvicorn pytest jsonschema requests

      - name: Regenerate frozen break suite and ensure it is checked in
        run: |
          python -m eval_engine.cli generate-break-suite --output examples/break_suite.jsonl
          git diff --exit-code -- examples/break_suite.jsonl

      - name: Run break suite
        run: |
          python -m eval_engine.cli break-suite \
            --suite examples/break_suite.jsonl \
            --artifacts_dir ci_artifacts/break_suite

      - name: Upload invariant artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invariants-artifacts
          path: |
            ci_artifacts/
            examples/break_suite.jsonl

  gate:
    runs-on: ubuntu-latest
    needs: invariants

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            pip install -e .
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install fastapi uvicorn pytest jsonschema requests

      - name: Start local HTTP SUT
        run: |
          nohup uvicorn server:app --host 127.0.0.1 --port 8000 > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for SUT /run endpoint
        run: |
          python - <<'PY'
          import json, time, urllib.request
          url = "http://127.0.0.1:8000/run"
          payload = {
              "item_id": "healthcheck",
              "prompt": "Return JSON",
              "input": {"a": 1, "b": 2},
              "output_schema": {
                  "type": "object",
                  "additionalProperties": False,
                  "required": ["answer"],
                  "properties": {"answer": {"type": "integer"}}
              },
              "task_type": "json_math_add"
          }
          data = json.dumps(payload).encode("utf-8")
          ok = False
          last_err = None
          for _ in range(30):
              try:
                  req = urllib.request.Request(
                      url,
                      data=data,
                      headers={"Content-Type": "application/json"},
                      method="POST",
                  )
                  with urllib.request.urlopen(req, timeout=3) as resp:
                      if resp.status == 200:
                          ok = True
                          break
              except Exception as e:
                  last_err = e
                  time.sleep(1)
          if not ok:
              raise SystemExit(f"SUT did not become ready: {last_err}")
          print("SUT is ready")
          PY

      - name: Run full gate
        run: |
          python -m eval_engine.cli gate \
            --break_suite examples/break_suite.jsonl \
            --golden_suite examples/golden_suite.jsonl \
            --sut_url http://127.0.0.1:8000/run \
            --sut_timeout 30 \
            --min_pass_rate 0.95 \
            --artifacts_dir ci_artifacts/gate

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-artifacts
          path: |
            ci_artifacts/
            server.log

      - name: Stop SUT
        if: always()
        run: |
          if [ -f server.pid ]; then kill $(cat server.pid) || true; fi
